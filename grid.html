<html>
  <head>
    <script src="math.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js"></script>
    <link rel="stylesheet" href="grid.css">
  </head>
  <body>
    <h1>Interactive Artificial Neural Network</h1>
    <section class="grid">
      <div class="col-1-2">
        <canvas id="canvas" width="512px" height="512px"></canvas>
        <br>
        <input type="number" id="lr" name="lr" value="0.01" step="0.01">
        <button onclick="set_lr()">Set Learning Rate</button>
        <br>
        <button onclick="reset_weights()">Reset Weights</button>
        <br>
        <select name="data_type" id="data_type">
          <option value="basic_data">Basic</option>
          <option value="random_data">Random</option>
          <option value="circle_data">Circular</option>
          <option value="spiral_data">Spiral</option>
        </select>
        <button onclick="generate_data()">Generate Data</button>
        <br>
      </div><!--
      --><div class="col-1-2">
        <canvas id="loss_canvas" width="512px" height="256px"></canvas><br>

        <input type="checkbox" id="train_loss_cb" onclick="redraw_plot();" checked>
        <label for"train_loss_cb">Training loss</label><br>

        <input type="checkbox" id="train_acc_cb" onclick="redraw_plot();" checked>
        <label for"train_acc_cb">Training Accuracy</label><br>

        <input type="checkbox" id="valid_loss" checked>
        <label for"valid_loss">Validation loss</label><br>

        <input type="checkbox" id="valid_loss" checked>
        <label for"valid_acc">Validation Accuracy</label><br>
      </div>
    </section>
  </body>
</html>

<script src="grid_script.js" type="text/javascript" language="javascript"></script>
